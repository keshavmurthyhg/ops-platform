<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Ops Platform</title>

    <link rel="stylesheet"
          href="{{ url_for('common_static.static', filename='css/common.css') }}">
</head>

<body>

<div class="app-layout">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar compact-sidebar">

        <div class="sidebar-title">
            Ops Platform
        </div>

        {% block sidebar %}
        {% endblock %}

    </aside>


    <!-- MAIN AREA -->
    <div class="main-content">

        {% block content %}
        {% endblock %}

    </div>

</div>

<div id="helpSystemModal" class="help-modal-backdrop hidden">
    <div class="help-modal-window">
        <div class="help-modal-header">
            <h2 id="helpModuleTitle">💡 Documentation Guide</h2>
            <button class="help-modal-close-btn" onclick="toggleHelpSystemModal()">✕</button>
        </div>
        <div class="help-modal-body">
            <div class="help-modal-left-pane" id="helpModalIndexPane">
                </div>
            <div class="help-modal-right-pane" id="helpModalContentPane">
                </div>
        </div>
    </div>
</div>

<script src="{{ url_for('common_static.static', filename='js/common.js') }}"></script>

{% block page_js %}
{% endblock %}

</body>
</html>
